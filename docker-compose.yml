version: '3.8'

services:
  redis:
    image: redis/redis-stack:latest
    ports:
      - "6379:6379"
      - "8001:8001" 

  async-bridge:
    build: .  
    ports:
      - "3000:3000"
    depends_on:
      - redis
    volumes:
      - ./src:/app/src 
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis 
      - WEBHOOK_RECEIVER_URL=http://async-bridge:3000/api/webhook-receiver